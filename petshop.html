<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pet Shop | Paseos Perrunos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">☰</button>
      <div class="logo">🐶 Paseos Perrunos</div>
      <ul class="menu" id="menu-principal" style="display:none;"></ul>
      <div class="navbar-usuario-zona" id="navbar-usuario-zona" style="display:none;">
        <button class="btn-dark-mode" aria-label="Modo oscuro">🌙</button>
        <a href="carrito.html" class="btn-carrito-link" id="btn-carrito-link">
          🛒 <span class="carrito-badge" id="carrito-badge" style="display:none;">0</span>
        </a>
        <div class="user-pill-wrapper">
          <button class="user-pill" id="user-pill-btn">
            <span class="user-pill-avatar" id="user-pill-avatar">👤</span>
            <span class="user-pill-nombre" id="user-pill-nombre"></span>
            <span class="user-pill-flecha">▾</span>
          </button>
          <div class="user-pill-menu" id="user-pill-menu">
            <a href="perfil.html">👤 Mi perfil</a>
            <a href="mascotas.html">🐾 Mis mascotas</a>
            <a href="reservas.html">📅 Mis reservas</a>
            <a href="pedidos.html">📦 Mis pedidos</a>
            <a href="#" id="user-pill-logout">🚪 Cerrar sesión</a>
          </div>
        </div>
      </div>
      <div class="navbar-sin-sesion" id="navbar-sin-sesion">
        <button class="btn-dark-mode" aria-label="Modo oscuro">🌙</button>
      </div>
    </nav>

    <!-- HERO -->
    <section class="hero petshop-hero">
      <h1>Todo lo que tu mascota necesita 🐾</h1>
      <p>Salud, juguetes, accesorios y bienestar en un solo lugar.</p>
    </section>

    <!-- CATÁLOGO -->
    <section class="container petshop-container">
      <div class="petshop-filtros" id="petshop-filtros">
        <button class="filtro-categoria activo" data-categoria="">Todos</button>
        <button class="filtro-categoria" data-categoria="Salud e Higiene">Salud e Higiene</button>
        <button class="filtro-categoria" data-categoria="Accesorios y Confort">Accesorios y Confort</button>
        <button class="filtro-categoria" data-categoria="Juguetes">Juguetes</button>
        <button class="filtro-categoria" data-categoria="Farmacia y Bienestar">Farmacia y Bienestar</button>
      </div>

      <div class="petshop-grid" id="petshop-grid">
        <div class="skeleton-card">
          <div class="skeleton skeleton-foto"></div>
          <div class="skeleton-info">
            <div class="skeleton skeleton-titulo"></div>
            <div class="skeleton skeleton-texto"></div>
          </div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton skeleton-foto"></div>
          <div class="skeleton-info">
            <div class="skeleton skeleton-titulo"></div>
            <div class="skeleton skeleton-texto"></div>
          </div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton skeleton-foto"></div>
          <div class="skeleton-info">
            <div class="skeleton skeleton-titulo"></div>
            <div class="skeleton skeleton-texto"></div>
          </div>
        </div>
      </div>

      <p class="petshop-empty" id="petshop-empty" style="display:none;">No hay productos en esta categoría todavía.</p>
    </section>

    <!-- MODAL DETALLE PRODUCTO -->
    <div class="modal-overlay" id="modal-producto" style="display:none;">
      <div class="modal-card modal-producto-card">
        <button class="modal-paseador-cerrar" id="modal-producto-cerrar">✕</button>
        <div class="modal-producto-foto" id="modal-producto-foto"></div>
        <span class="producto-admin-categoria" id="modal-producto-categoria"></span>
        <h2 class="modal-producto-nombre" id="modal-producto-nombre"></h2>
        <p class="modal-producto-descripcion" id="modal-producto-descripcion"></p>
        <p class="modal-producto-precio" id="modal-producto-precio"></p>
        <p class="modal-producto-stock" id="modal-producto-stock"></p>
        <div class="modal-producto-cantidad">
          <button class="cantidad-btn" id="cantidad-restar">−</button>
          <span id="cantidad-valor">1</span>
          <button class="cantidad-btn" id="cantidad-sumar">+</button>
        </div>
        <button class="btn-agregar modal-producto-btn" id="btn-agregar-carrito">Agregar al carrito 🛒</button>
      </div>
    </div>

    <script src="assets/js/main.js?v=2"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mis Mascotas | Paseos Perrunos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">☰</button>
      <h2 class="logo">Paseos Perrunos 🐶</h2>
      <ul class="menu" id="menu-principal" style="display:none;"></ul>
      <div class="navbar-usuario-zona" id="navbar-usuario-zona" style="display:none;">
        <button class="btn-dark-mode" aria-label="Modo oscuro">🌙</button>
        <div class="user-pill-wrapper">
          <button class="user-pill" id="user-pill-btn">
            <span class="user-pill-avatar" id="user-pill-avatar">👤</span>
            <span class="user-pill-nombre" id="user-pill-nombre"></span>
            <span class="user-pill-flecha">▾</span>
          </button>
          <div class="user-pill-menu" id="user-pill-menu">
            <a href="perfil.html">👤 Mi perfil</a>
            <a href="reservas.html">📅 Mis reservas</a>
            <a href="#" id="user-pill-logout">🚪 Cerrar sesión</a>
          </div>
        </div>
      </div>
    </nav>
    <section class="mascotas-container">
      <div class="mascotas-header">
        <h1>Mis Mascotas 🐾</h1>
        <button class="btn-agregar" id="btn-agregar">+ Agregar mascota</button>
      </div>

      <div class="mascotas-filtros" id="mascotas-filtros" style="display: none">
        <input
          type="text"
          id="buscar-mascota"
          placeholder="🔍 Buscar por nombre..."
          class="input-buscar"
        />
        <select id="filtrar-raza" class="select-filtrar">
          <option value="">Todas las razas</option>
        </select>
      </div>

      <div
        class="formulario-mascota"
        id="formulario-mascota"
        style="display: none"
      >
        <h2>Registrar mascota</h2>
        <form id="mascota-form">
          <input
            type="text"
            id="mascota-nombre"
            placeholder="Nombre de la mascota"
            required
          />
          <input type="text" id="mascota-raza" placeholder="Raza" required />
          <input
            type="number"
            id="mascota-edad"
            placeholder="Edad (años)"
            min="0"
            max="30"
            required
          />
          <textarea
            id="mascota-notas"
            placeholder="Notas especiales (opcional)"
            rows="3"
          ></textarea>
          <label class="label-foto">
            Foto de tu mascota (opcional)
            <div class="foto-input-wrapper">
              <input
                type="file"
                id="mascota-foto"
                accept="image/jpg, image/jpeg, image/png, image/webp"
              />
              <button type="button" id="btn-quitar-foto" style="display: none">
                ✕
              </button>
            </div>
            <span id="foto-nombre" class="foto-nombre"></span>
          </label>
          <button type="submit">Registrar mascota</button>
          <p id="mascota-message"></p>
        </form>
      </div>

      <div
        class="formulario-mascota"
        id="formulario-editar"
        style="display: none"
      >
        <h2>Editar mascota ✏️</h2>
        <form id="editar-form">
          <input type="hidden" id="editar-id" />
          <input
            type="text"
            id="editar-nombre"
            placeholder="Nombre de la mascota"
            required
          />
          <input type="text" id="editar-raza" placeholder="Raza" required />
          <input
            type="number"
            id="editar-edad"
            placeholder="Edad (años)"
            min="0"
            max="30"
            required
          />
          <textarea
            id="editar-notas"
            placeholder="Notas especiales (opcional)"
            rows="3"
          ></textarea>
          <label class="label-foto">
            Nueva foto (opcional, reemplaza la actual)
            <div class="foto-input-wrapper">
              <input
                type="file"
                id="editar-foto"
                accept="image/jpg, image/jpeg, image/png, image/webp"
              />
              <button
                type="button"
                id="btn-quitar-foto-editar"
                style="display: none"
              >
                ✕
              </button>
            </div>
            <span id="editar-foto-nombre" class="foto-nombre"></span>
          </label>
          <div class="editar-botones">
            <button type="submit">Guardar cambios</button>
            <button
              type="button"
              id="btn-cancelar-editar"
              class="btn-cancelar-editar"
            >
              Cancelar
            </button>
          </div>
          <p id="editar-message"></p>
        </form>
      </div>

      <div class="mascotas-lista" id="mascotas-lista">
        <p class="mascotas-empty" id="mascotas-empty">
          No tienes mascotas registradas aún.
        </p>
      </div>
    </section>

    <script src="assets/js/main.js"></script>
  </body>
</html>

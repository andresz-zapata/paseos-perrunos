<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mis Reservas | Paseos Perrunos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">☰</button>
      <h2 class="logo">Paseos Perrunos 🐶</h2>
      <ul class="menu" id="menu-principal" style="display:none;"></ul>
      <div class="navbar-usuario-zona" id="navbar-usuario-zona" style="display:none;">
        <button class="btn-dark-mode" aria-label="Modo oscuro">🌙</button>
        <div class="user-pill-wrapper">
          <button class="user-pill" id="user-pill-btn">
            <span class="user-pill-avatar" id="user-pill-avatar">👤</span>
            <span class="user-pill-nombre" id="user-pill-nombre"></span>
            <span class="user-pill-flecha">▾</span>
          </button>
          <div class="user-pill-menu" id="user-pill-menu">
            <a href="perfil.html">👤 Mi perfil</a>
            <a href="mascotas.html">🐾 Mis mascotas</a>
            <a href="#" id="user-pill-logout">🚪 Cerrar sesión</a>
          </div>
        </div>
      </div>
    </nav>

    <section class="reservas-container">
      <div class="reservas-header">
        <h1>Mis Reservas 📅</h1>
        <button class="btn-agregar" id="btn-nueva-reserva">
          + Nueva reserva
        </button>
      </div>

      <div
        class="formulario-reserva"
        id="formulario-reserva"
        style="display: none"
      >
        <h2>Nueva reserva de paseo 🐾</h2>
        <form id="reserva-form">
          <label class="label-campo">
            Mascota
            <select id="reserva-mascota" required>
              <option value="">Cargando mascotas...</option>
            </select>
          </label>
          <label class="label-campo">
            Paseador (opcional)
            <select id="reserva-paseador">
              <option value="">Sin preferencia, cualquier paseador disponible</option>
            </select>
          </label>
          <label class="label-campo">
            Fecha y hora
            <input type="datetime-local" id="reserva-fecha" required />
          </label>
          <label class="label-campo">
            Dirección de recogida
            <input
              type="text"
              id="reserva-direccion"
              placeholder="Ej: Calle 10 #45-20, Medellín"
              required
            />
          </label>
          <label class="label-campo">
            Notas adicionales (opcional)
            <textarea
              id="reserva-notas"
              placeholder="Ej: Mi perro es tímido con extraños"
              rows="3"
            ></textarea>
          </label>
          <button type="submit">Crear reserva</button>
          <p id="reserva-message"></p>
        </form>
      </div>

      <div class="reservas-tabs">
        <button class="tab-btn tab-activo" data-tab="proximas">Próximas</button>
        <button class="tab-btn" data-tab="historial">Historial</button>
      </div>

      <div id="tab-proximas">
        <div class="reservas-lista" id="reservas-lista">
          <p class="reservas-empty" id="reservas-empty">
            No tienes reservas próximas.
          </p>
        </div>
      </div>

      <div id="tab-historial" style="display: none">
        <div class="reservas-lista" id="historial-lista">
          <p class="reservas-empty" id="historial-empty">
            No tienes reservas en el historial.
          </p>
        </div>
      </div>
    </section>

    <!-- MODAL CALIFICAR PASEADOR -->
<div class="modal-overlay" id="modal-calificar" style="display:none;">
  <div class="modal-card modal-solicitud-card">
    <h2 class="modal-paseador-nombre">Califica tu paseo 🐾</h2>
    <p class="modal-solicitud-intro" id="modal-calificar-texto"></p>

    <div class="estrellas-selector" id="estrellas-selector">
      <span class="estrella" data-valor="1">★</span>
      <span class="estrella" data-valor="2">★</span>
      <span class="estrella" data-valor="3">★</span>
      <span class="estrella" data-valor="4">★</span>
      <span class="estrella" data-valor="5">★</span>
    </div>

    <form id="calificar-form" class="solicitud-paseador-form">
      <input type="hidden" id="calificar-reserva-id" />
      <input type="hidden" id="calificar-estrellas" value="0" />
      <textarea id="calificar-comentario" placeholder="Cuéntanos cómo fue tu experiencia (opcional)" rows="3"></textarea>
      <button type="submit" class="btn-agregar modal-producto-btn">Enviar calificación</button>
      <button type="button" class="btn-cancelar-editar" id="btn-cancelar-calificar" style="width:100%; margin-top:8px;">Cancelar</button>
      <p id="calificar-message"></p>
    </form>
  </div>
</div>

    <script src="assets/js/main.js?v=2"></script>
  </body>
</html>

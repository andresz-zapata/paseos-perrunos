<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Perfil | Paseos Perrunos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">☰</button>
      <h2 class="logo">Paseos Perrunos 🐶</h2>
      <ul class="menu">
        <li><button class="btn-dark-mode" aria-label="Modo oscuro">🌙</button></li>
        <li id="nombre-usuario"></li>
        <li><a href="#" id="cerrar-sesion">Cerrar sesión</a></li>
      </ul>
    </nav>
    <section class="perfil-hero">
      <div class="perfil-hero-info">
        <div class="perfil-avatar" id="perfil-avatar">
          <img
            id="perfil-foto"
            src=""
            alt="Foto de perfil"
            style="display: none"
          />
          <span id="perfil-emoji">🐾</span>
        </div>
        <div class="perfil-hero-texto">
          <h1 id="perfil-nombre">Cargando...</h1>
          <p id="perfil-email" class="perfil-email">Cargando...</p>
          <p class="perfil-miembro">Miembro de Paseos Perrunos</p>
          <label class="label-foto-perfil" id="label-foto-perfil">
            📷 Cambiar foto de perfil
            <input
              type="file"
              id="foto-perfil-input"
              accept="image/jpg, image/jpeg, image/png, image/webp"
            />
          </label>
          <p id="foto-perfil-message"></p>
        </div>
      </div>
    </section>

    <section class="perfil-editar-container">
      <div class="perfil-editar-header" id="perfil-editar-toggle">
        <h2>✏️ Editar perfil</h2>
        <span class="perfil-editar-arrow">▼</span>
      </div>
      <div class="perfil-editar-form" id="perfil-editar-form" style="display:none;">
        <form id="editar-perfil-form">
          <label class="label-campo">
            Nombre completo
            <input type="text" id="editar-perfil-nombre" placeholder="Tu nombre completo" required />
          </label>
          <label class="label-campo">
            Nuevo correo electrónico (opcional)
            <input type="email" id="editar-perfil-email" placeholder="nuevo@correo.com" />
          </label>
          <label class="label-campo">
            Contraseña actual (requerida para cambiar correo o contraseña)
            <div class="password-container">
              <input type="password" id="editar-perfil-password-actual" placeholder="Contraseña actual" />
              <span class="toggle-password" id="toggle-password-actual">👁️</span>
            </div>
          </label>
          <label class="label-campo">
            Nueva contraseña (opcional)
            <div class="password-container">
              <input type="password" id="editar-perfil-password-nueva" placeholder="Nueva contraseña" />
              <span class="toggle-password" id="toggle-password-nueva">👁️</span>
            </div>
          </label>
          <button type="submit" class="btn-agregar" style="width:100%; margin-top:10px;">Guardar cambios</button>
        </form>
      </div>
    </section>

    <section class="perfil-secciones">
      <a href="mascotas.html" class="perfil-seccion-card">
        <div class="perfil-seccion-icono">🐾</div>
        <div class="perfil-seccion-info">
          <h2>Mis Mascotas</h2>
          <p>Registra y gestiona las mascotas de tu hogar</p>
        </div>
        <span class="perfil-seccion-arrow">→</span>
      </a>
      <a href="reservas.html" class="perfil-seccion-card">
        <div class="perfil-seccion-icono">📅</div>
        <div class="perfil-seccion-info">
          <h2>Mis Reservas</h2>
          <p>Agenda y revisa tus paseos programados</p>
        </div>
        <span class="perfil-seccion-arrow">→</span>
      </a>
    </section>
    <script src="assets/js/main.js"></script>
  </body>
</html>

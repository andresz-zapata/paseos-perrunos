<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Admin | Paseos Perrunos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">
        ☰
      </button>
      <h2 class="logo">
        Paseos Perrunos 🐶 <span class="badge-admin">Admin</span>
      </h2>
      <ul class="menu">
        <li>
          <button class="btn-dark-mode" aria-label="Modo oscuro">🌙</button>
        </li>
        <li><a href="admin-perfil.html">Mi Perfil</a></li>
        <li id="nombre-usuario" class="navbar-nombre-usuario"></li>
        <li id="cerrar-sesion-li" style="display:none;"><a href="#" id="cerrar-sesion">Cerrar sesión</a></li>
      </ul>
    </nav>

    <section class="admin-container">
      <div class="admin-header">
        <h1>Panel de Administración 🛠️</h1>
        <p class="admin-subtitulo">Gestiona tu negocio desde un solo lugar</p>
      </div>

      <div class="admin-tabs">
        <button class="admin-tab-btn admin-tab-activo" data-tab="dashboard">
          📊 Dashboard
        </button>
        <button class="admin-tab-btn" data-tab="reservas">📅 Reservas</button>
        <button class="admin-tab-btn" data-tab="usuarios">👥 Usuarios</button>
      </div>

      <div id="tab-dashboard">
        <div class="stats-grid" id="stats-grid">
          <div class="stat-card skeleton-stat">
            <div class="skeleton skeleton-titulo"></div>
            <div class="skeleton skeleton-texto"></div>
          </div>
          <div class="stat-card skeleton-stat">
            <div class="skeleton skeleton-titulo"></div>
            <div class="skeleton skeleton-texto"></div>
          </div>
          <div class="stat-card skeleton-stat">
            <div class="skeleton skeleton-titulo"></div>
            <div class="skeleton skeleton-texto"></div>
          </div>
          <div class="stat-card skeleton-stat">
            <div class="skeleton skeleton-titulo"></div>
            <div class="skeleton skeleton-texto"></div>
          </div>
          <div class="stat-card skeleton-stat">
            <div class="skeleton skeleton-titulo"></div>
            <div class="skeleton skeleton-texto"></div>
          </div>
          <div class="stat-card skeleton-stat">
            <div class="skeleton skeleton-titulo"></div>
            <div class="skeleton skeleton-texto"></div>
          </div>
        </div>
      </div>

      <div id="tab-reservas" style="display: none">
        <div class="admin-filtros">
          <button class="filtro-btn filtro-activo" data-filtro="todas">
            Todas
          </button>
          <button class="filtro-btn" data-filtro="pendiente">Pendientes</button>
          <button class="filtro-btn" data-filtro="confirmada">
            Confirmadas
          </button>
          <button class="filtro-btn" data-filtro="cancelada">Canceladas</button>
        </div>
        <div class="admin-lista" id="admin-lista">
          <p class="reservas-empty" id="admin-empty">Cargando reservas...</p>
        </div>
      </div>

      <div id="tab-usuarios" style="display: none">
        <div class="usuarios-lista" id="usuarios-lista">
          <p class="reservas-empty" id="usuarios-empty">Cargando usuarios...</p>
        </div>
      </div>
    </section>

    <script src="assets/js/main.js"></script>
  </body>
</html>

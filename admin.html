<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Admin | Paseos Perrunos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <h2 class="logo">
        Paseos Perrunos 🐶 <span class="badge-admin">Admin</span>
      </h2>
      <ul class="menu">
        <li id="nombre-usuario"></li>
        <li><a href="#" id="cerrar-sesion">Cerrar sesión</a></li>
      </ul>
    </nav>

    <section class="admin-container">
      <div class="admin-header">
        <h1>Panel de Administración 🛠️</h1>
        <p class="admin-subtitulo">
          Gestiona todas las reservas de tus clientes
        </p>
      </div>

      <div class="admin-filtros">
        <button class="filtro-btn filtro-activo" data-filtro="todas">
          Todas
        </button>
        <button class="filtro-btn" data-filtro="pendiente">Pendientes</button>
        <button class="filtro-btn" data-filtro="confirmada">Confirmadas</button>
        <button class="filtro-btn" data-filtro="cancelada">Canceladas</button>
      </div>

      <div class="admin-lista" id="admin-lista">
        <p class="reservas-empty" id="admin-empty">Cargando reservas...</p>
      </div>
    </section>

    <script src="assets/js/main.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Admin | Paseos Perrunos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">
        ☰
      </button>
      <h2 class="logo">
        Paseos Perrunos 🐶 <span class="badge-admin">Admin</span>
      </h2>
      <ul class="menu" id="menu-principal" style="display:none;"></ul>
      <div class="navbar-usuario-zona" id="navbar-usuario-zona" style="display:none;">
        <button class="btn-dark-mode" aria-label="Modo oscuro">🌙</button>
        <div class="user-pill-wrapper">
          <button class="user-pill" id="user-pill-btn">
            <span class="user-pill-avatar" id="user-pill-avatar">👤</span>
            <span class="user-pill-nombre" id="user-pill-nombre"></span>
            <span class="user-pill-flecha">▾</span>
          </button>
          <div class="user-pill-menu" id="user-pill-menu">
            <a href="admin-perfil.html">⚙️ Mi perfil</a>
            <a href="#" id="user-pill-logout">🚪 Cerrar sesión</a>
          </div>
        </div>
      </div>
    </nav>

    <section class="admin-container">
      <div class="admin-header">
        <h1>Panel de Administración 🛠️</h1>
        <p class="admin-subtitulo">Gestiona tu negocio desde un solo lugar</p>
      </div>

      <div class="admin-tabs">
        <button class="admin-tab-btn admin-tab-activo" data-tab="dashboard">📊 Dashboard</button>
        <button class="admin-tab-btn" data-tab="reservas">📅 Reservas</button>
        <button class="admin-tab-btn" data-tab="usuarios">👥 Usuarios</button>
        <button class="admin-tab-btn" data-tab="productos">📦 Productos</button>
        <button class="admin-tab-btn" data-tab="pedidos">🛍️ Pedidos</button>
      </div>

      <div id="tab-dashboard">
        <div class="stats-grid" id="stats-grid">
          <div class="stat-card skeleton-stat">
            <div class="skeleton skeleton-titulo"></div>
            <div class="skeleton skeleton-texto"></div>
          </div>
          <div class="stat-card skeleton-stat">
            <div class="skeleton skeleton-titulo"></div>
            <div class="skeleton skeleton-texto"></div>
          </div>
          <div class="stat-card skeleton-stat">
            <div class="skeleton skeleton-titulo"></div>
            <div class="skeleton skeleton-texto"></div>
          </div>
          <div class="stat-card skeleton-stat">
            <div class="skeleton skeleton-titulo"></div>
            <div class="skeleton skeleton-texto"></div>
          </div>
          <div class="stat-card skeleton-stat">
            <div class="skeleton skeleton-titulo"></div>
            <div class="skeleton skeleton-texto"></div>
          </div>
          <div class="stat-card skeleton-stat">
            <div class="skeleton skeleton-titulo"></div>
            <div class="skeleton skeleton-texto"></div>
          </div>
        </div>
      </div>

      <div id="tab-reservas" style="display: none">
        <div class="admin-filtros">
          <button class="filtro-btn filtro-activo" data-filtro="todas">
            Todas
          </button>
          <button class="filtro-btn" data-filtro="pendiente">Pendientes</button>
          <button class="filtro-btn" data-filtro="confirmada">
            Confirmadas
          </button>
          <button class="filtro-btn" data-filtro="cancelada">Canceladas</button>
        </div>
        <div class="admin-lista" id="admin-lista">
          <p class="reservas-empty" id="admin-empty">Cargando reservas...</p>
        </div>
      </div>

      <div id="tab-usuarios" style="display: none">
        <div class="usuarios-lista" id="usuarios-lista">
          <p class="reservas-empty" id="usuarios-empty">Cargando usuarios...</p>
        </div>
      </div>
      <div id="tab-productos" style="display:none;">
        <div class="productos-admin-header">
          <button class="btn-agregar" id="btn-nuevo-producto">+ Nuevo producto</button>
        </div>

        <div class="formulario-producto" id="formulario-producto" style="display:none;">
          <h2 id="producto-form-titulo">Nuevo producto</h2>
          <form id="producto-form">
            <input type="hidden" id="producto-id" />
            <input type="text" id="producto-nombre" placeholder="Nombre del producto" required />
            <textarea id="producto-descripcion" placeholder="Descripción del producto" rows="3" required></textarea>
            <div class="producto-form-grid">
              <input type="number" id="producto-precio" placeholder="Precio (COP)" min="0" step="100" required />
              <input type="number" id="producto-stock" placeholder="Stock disponible" min="0" required />
            </div>
            <select id="producto-categoria" required>
              <option value="">Selecciona una categoría</option>
              <option value="Salud e Higiene">Salud e Higiene</option>
              <option value="Accesorios y Confort">Accesorios y Confort</option>
              <option value="Juguetes">Juguetes</option>
              <option value="Farmacia y Bienestar">Farmacia y Bienestar</option>
            </select>
            <label class="label-foto">
              Foto del producto
              <div class="foto-input-wrapper">
                <input type="file" id="producto-foto" accept="image/jpg, image/jpeg, image/png, image/webp" />
              </div>
              <span id="producto-foto-nombre" class="foto-nombre"></span>
            </label>
            <div class="editar-botones">
              <button type="submit">Guardar producto</button>
              <button type="button" id="btn-cancelar-producto" class="btn-cancelar-editar">Cancelar</button>
            </div>
            <p id="producto-message"></p>
          </form>
        </div>

        <div class="productos-admin-lista" id="productos-admin-lista">
          <p class="reservas-empty" id="productos-admin-empty">Cargando productos...</p>
        </div>
      </div>

      <div id="tab-pedidos" style="display:none;">
        <div class="admin-filtros">
          <button class="filtro-btn-pedido filtro-pedido-activo" data-filtro-pedido="todos">Todos</button>
          <button class="filtro-btn-pedido" data-filtro-pedido="pendiente_pago">Pendiente pago</button>
          <button class="filtro-btn-pedido" data-filtro-pedido="pagado">Pagados</button>
          <button class="filtro-btn-pedido" data-filtro-pedido="enviado">Enviados</button>
          <button class="filtro-btn-pedido" data-filtro-pedido="entregado">Entregados</button>
          <button class="filtro-btn-pedido" data-filtro-pedido="cancelado">Cancelados</button>
        </div>

        <div class="admin-lista" id="pedidos-admin-lista">
          <p class="reservas-empty" id="pedidos-admin-empty">Cargando pedidos...</p>
        </div>
      </div>
    </section>

    <script src="assets/js/main.js"></script>
  </body>
</html>
